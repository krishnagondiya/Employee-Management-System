{% load static %}
<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
  </head>
  <body class="bg-light">
    <div class="container mt-5">
      <div class="card p-4 shadow">
        <h2>Welcome, {{ request.user.username }} (Admin)</h2>
        <div class="row mt-4">
          <div class="col-md-4">
            <div class="card p-3">
              <h5>Total Employees</h5>
              <p class="fs-4">{{ total_employees }}</p>
            </div>
          </div>
          <div class="col-md-4">
            <div class="card p-3">
              <h5>Departments</h5>
              <p class="fs-4">{{ total_departments }}</p>
            </div>
          </div>
          <div class="col-md-4">
            <div class="card p-3">
              <h5>Pending Leaves</h5>
              <p class="fs-4">{{ pending_leaves }}</p>
            </div>
          </div>
        </div>
        <a href="{% url 'logout' %}" class="btn btn-danger mt-4">Logout</a>
      </div>
    </div>
  </body>
</html>
