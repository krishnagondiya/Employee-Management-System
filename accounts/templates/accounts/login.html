{% load static %}
<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <title>Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f1f1f1;
        }
        .form-wrapper {
            width: 90vw;
            max-width: 480px;       
            margin: 40px auto;
        }
        .form-card {
            min-height: 520px;      
            padding: 30px;
            border-radius: 12px;
            background: white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .form-label {
            font-weight: 500;
        }
    </style>
</head>

<body>

<div class="form-wrapper">
    <div class="form-card">

        <h3 class="text-center mb-4">Login</h3>

        {% if messages %}
            {% for m in messages %}
                <div class="alert alert-{{ m.tags }}">{{ m }}</div>
            {% endfor %}
        {% endif %}

        <form method="post">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label">Username</label>
                {{ form.username }}
            </div>

            <div class="mb-3">
                <label class="form-label">Password</label>
                {{ form.password }}
            </div>

            <button class="btn btn-success w-100" style="height:45px;">Login</button>
        </form>

        <p class="text-center mt-3">
            Don’t have an account?
            <a href="{% url 'signup' %}">Sign Up</a>
        </p>

    </div>
</div>

</body>
</html>
